<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/template.xhtml">

	<ui:define name="title">Kunden - SAP Consulting App</ui:define>
	<ui:define name="heading">Kundenverwaltung</ui:define>

	<ui:define name="content">
		<!-- Formular: Kunde anlegen / bearbeiten -->
		<div class="section">
			<h2>#{empty requestScope.formKunde.id ? 'Neuen Kunden anlegen' : 'Kunden bearbeiten'}</h2>
			<form action="#{request.contextPath}/kunden" method="post">
				<input type="hidden" name="action" value="speichern" />
				<h:panelGroup rendered="#{not empty requestScope.formKunde.id}">
					<input type="hidden" name="id" value="#{requestScope.formKunde.id}" />
				</h:panelGroup>
				<div class="form-group">
					<label for="firmenname">Firmenname:</label>
					<input type="text" id="firmenname" name="firmenname" required="required"
						value="#{requestScope.formKunde.firmenname}" />
				</div>
				<div class="form-group">
					<label for="branche">Branche:</label>
					<input type="text" id="branche" name="branche" value="#{requestScope.formKunde.branche}" />
				</div>
				<div class="form-group">
					<label for="ansprechpartner">Ansprechpartner:</label>
					<input type="text" id="ansprechpartner" name="ansprechpartner"
						value="#{requestScope.formKunde.ansprechpartner}" />
				</div>
				<div class="form-group">
					<label for="adresse">Adresse:</label>
					<input type="text" id="adresse" name="adresse" value="#{requestScope.formKunde.adresse}" />
				</div>
				<div class="form-group">
					<label for="email">E-Mail:</label>
					<input type="email" id="email" name="email" value="#{requestScope.formKunde.email}" />
				</div>
				<input type="submit" value="Speichern" class="btn btn-primary" />
				<a href="#{request.contextPath}/kunden" class="btn">Abbrechen</a>
			</form>
		</div>

		<!-- Tabelle: Alle Kunden -->
		<div class="section">
			<h2>Kundenliste</h2>
			<h:dataTable value="#{requestScope.kunden}" var="k" styleClass="" headerClass="" rowClasses="">
				<h:column>
					<f:facet name="header">Firmenname</f:facet>
					#{k.firmenname}
				</h:column>
				<h:column>
					<f:facet name="header">Branche</f:facet>
					#{k.branche}
				</h:column>
				<h:column>
					<f:facet name="header">Ansprechpartner</f:facet>
					#{k.ansprechpartner}
				</h:column>
				<h:column>
					<f:facet name="header">E-Mail</f:facet>
					#{k.email}
				</h:column>
				<h:column>
					<f:facet name="header">Aktionen</f:facet>
					<a href="#{request.contextPath}/kunden?id=#{k.id}" class="btn btn-primary">Bearbeiten</a>
					<form action="#{request.contextPath}/kunden" method="post" style="display:inline">
						<input type="hidden" name="action" value="loeschen" />
						<input type="hidden" name="id" value="#{k.id}" />
						<input type="submit" value="Loeschen" class="btn btn-danger"
							onclick="return confirm('Wirklich loeschen?')" />
					</form>
				</h:column>
			</h:dataTable>
		</div>
	</ui:define>

</ui:composition>

</html>

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/template.xhtml">

	<ui:define name="title">Projekte - SAP Consulting App</ui:define>
	<ui:define name="heading">Projektverwaltung</ui:define>

	<ui:define name="content">
		<!-- Formular: Projekt anlegen / bearbeiten -->
		<div class="section">
			<h2>#{empty requestScope.formProjekt.id ? 'Neues Projekt anlegen' : 'Projekt bearbeiten'}</h2>
			<form action="#{request.contextPath}/projekte" method="post">
				<input type="hidden" name="action" value="speichern" />
				<h:panelGroup rendered="#{not empty requestScope.formProjekt.id}">
					<input type="hidden" name="id" value="#{requestScope.formProjekt.id}" />
				</h:panelGroup>
				<div class="form-group">
					<label for="bezeichnung">Bezeichnung:</label>
					<input type="text" id="bezeichnung" name="bezeichnung" required="required"
						value="#{requestScope.formProjekt.bezeichnung}" />
				</div>
				<div class="form-group">
					<label for="beschreibung">Beschreibung:</label>
					<textarea id="beschreibung" name="beschreibung"
						rows="3">#{requestScope.formProjekt.beschreibung}</textarea>
				</div>
				<div class="form-group">
					<label for="kundeId">Kunde:</label>
					<select id="kundeId" name="kundeId" required="required">
						<option value="">-- Kunde waehlen --</option>
						<ui:repeat value="#{requestScope.alleKunden}" var="k">
							<option value="#{k.id}"
								selected="#{requestScope.formProjekt.kunde != null and requestScope.formProjekt.kunde.id == k.id ? 'selected' : null}">
								#{k.firmenname}
							</option>
						</ui:repeat>
					</select>
				</div>
				<div class="form-group">
					<label for="sapModul">SAP-Modul:</label>
					<select id="sapModul" name="sapModul" required="required">
						<option value="">-- Modul waehlen --</option>
						<ui:repeat value="#{app.sapModule}" var="m">
							<option value="#{m}"
								selected="#{requestScope.formProjekt.sapModul == m ? 'selected' : null}">
								#{m.bezeichnung}
							</option>
						</ui:repeat>
					</select>
				</div>
				<div class="form-group">
					<label for="startDatum">Startdatum (TT.MM.JJJJ):</label>
					<input type="text" id="startDatum" name="startDatum">
					<h:outputText value="#{requestScope.formProjekt.startDatum}">
						<f:convertDateTime pattern="dd.MM.yyyy" />
					</h:outputText>
					</input>
				</div>
				<div class="form-group">
					<label for="endDatum">Enddatum (TT.MM.JJJJ):</label>
					<input type="text" id="endDatum" name="endDatum">
					<h:outputText value="#{requestScope.formProjekt.endDatum}">
						<f:convertDateTime pattern="dd.MM.yyyy" />
					</h:outputText>
					</input>
				</div>
				<div class="form-group">
					<label for="budgetStunden">Budget (Stunden):</label>
					<input type="number" id="budgetStunden" name="budgetStunden"
						value="#{requestScope.formProjekt.budgetStunden}" />
				</div>
				<div class="form-group">
					<label for="budgetEuro">Budget (Euro):</label>
					<input type="text" id="budgetEuro" name="budgetEuro"
						value="#{requestScope.formProjekt.budgetEuro}" />
				</div>
				<input type="submit" value="Speichern" class="btn btn-primary" />
				<a href="#{request.contextPath}/projekte" class="btn">Abbrechen</a>
			</form>
		</div>

		<!-- Tabelle: Alle Projekte -->
		<div class="section">
			<h2>Projektliste</h2>
			<h:dataTable value="#{requestScope.projekte}" var="p" styleClass="" headerClass="" rowClasses="">
				<h:column>
					<f:facet name="header">Bezeichnung</f:facet>
					#{p.bezeichnung}
				</h:column>
				<h:column>
					<f:facet name="header">Kunde</f:facet>
					#{p.kunde.firmenname}
				</h:column>
				<h:column>
					<f:facet name="header">SAP-Modul</f:facet>
					#{p.sapModul}
				</h:column>
				<h:column>
					<f:facet name="header">Status</f:facet>
					#{p.status}
				</h:column>
				<h:column>
					<f:facet name="header">Zeitraum</f:facet>
					<h:outputText value="#{p.startDatum}">
						<f:convertDateTime pattern="dd.MM.yyyy" />
					</h:outputText>
					-
					<h:outputText value="#{p.endDatum}">
						<f:convertDateTime pattern="dd.MM.yyyy" />
					</h:outputText>
				</h:column>
				<h:column>
					<f:facet name="header">Aktionen</f:facet>
					<a href="#{request.contextPath}/projekte?id=#{p.id}" class="btn btn-primary">Bearbeiten</a>
					<a href="#{request.contextPath}/projekt-detail?id=#{p.id}" class="btn btn-success">Detail</a>
					<form action="#{request.contextPath}/projekte" method="post" style="display:inline">
						<input type="hidden" name="action" value="loeschen" />
						<input type="hidden" name="id" value="#{p.id}" />
						<input type="submit" value="Loeschen" class="btn btn-danger"
							onclick="return confirm('Wirklich loeschen?')" />
					</form>
				</h:column>
			</h:dataTable>
		</div>
	</ui:define>

</ui:composition>

</html>

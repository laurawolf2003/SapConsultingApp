<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/template.xhtml">

    <ui:define name="title">Zeitbuchung - SAP Consulting App</ui:define>
    <ui:define name="heading">Zeiterfassung</ui:define>

    <ui:define name="content">
        <!-- Formular: Neue Zeitbuchung -->
        <div class="section">
            <h2>Neue Zeitbuchung</h2>
            <h:form id="zeitForm">
                <div class="form-group">
                    <h:outputLabel for="projekt" value="Projekt (nur aktive):" />
                    <h:selectOneMenu id="projekt" value="#{zeitController.neuerEintrag.projekt}"
                                     converter="#{projektConverter}" required="true"
                                     requiredMessage="Projekt muss ausgewaehlt werden">
                        <f:selectItem itemLabel="-- Projekt waehlen --" itemValue="" noSelectionOption="true" />
                        <f:selectItems value="#{zeitController.aktiveProjekte}" var="p"
                                       itemLabel="#{p.bezeichnung} (#{p.kunde.firmenname})" itemValue="#{p}" />
                        <f:ajax event="change" listener="#{zeitController.projektGewaehlt}"
                                render="zeiteintraegeTabelle" />
                    </h:selectOneMenu>
                </div>
                <div class="form-group">
                    <h:outputLabel for="berater" value="Berater:" />
                    <h:selectOneMenu id="berater" value="#{zeitController.neuerEintrag.berater}"
                                     converter="beraterConverter" required="true"
                                     requiredMessage="Berater muss ausgewaehlt werden">
                        <f:selectItem itemLabel="-- Berater waehlen --" itemValue="" noSelectionOption="true" />
                        <f:selectItems value="#{zeitController.alleBerater}" var="b"
                                       itemLabel="#{b.vollerName}" itemValue="#{b}" />
                    </h:selectOneMenu>
                </div>
                <div class="form-group">
                    <h:outputLabel for="datum" value="Datum:" />
                    <h:inputText id="datum" value="#{zeitController.neuerEintrag.datum}"
                                 required="true" requiredMessage="Datum ist erforderlich">
                        <f:convertDateTime pattern="dd.MM.yyyy" />
                    </h:inputText>
                </div>
                <div class="form-group">
                    <h:outputLabel for="stunden" value="Stunden:" />
                    <h:inputText id="stunden" value="#{zeitController.neuerEintrag.stunden}"
                                 required="true" requiredMessage="Stunden sind erforderlich" />
                </div>
                <div class="form-group">
                    <h:outputLabel for="beschreibung" value="Taetigkeit:" />
                    <h:inputTextarea id="beschreibung" value="#{zeitController.neuerEintrag.beschreibung}"
                                     rows="2" />
                </div>
                <div class="form-group">
                    <h:outputLabel for="abrechenbar" value="Abrechenbar:" />
                    <h:selectBooleanCheckbox id="abrechenbar" value="#{zeitController.neuerEintrag.abrechenbar}" />
                </div>
                <h:commandButton value="Buchen" action="#{zeitController.buchen}"
                                 styleClass="btn btn-primary" />
            </h:form>
        </div>

        <!-- Tabelle: Zeiteintraege des gewaehlten Projekts -->
        <div class="section">
            <h2>Zeiteintraege</h2>
            <h:form id="zeiteintraegeTabelle">
                <h:dataTable value="#{zeitController.zeiteintraege}" var="z"
                             styleClass="" headerClass="" rowClasses="">
                    <h:column>
                        <f:facet name="header">Datum</f:facet>
                        <h:outputText value="#{z.datum}">
                            <f:convertDateTime pattern="dd.MM.yyyy" />
                        </h:outputText>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Berater</f:facet>
                        #{z.berater.vollerName}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Stunden</f:facet>
                        #{z.stunden}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Taetigkeit</f:facet>
                        #{z.beschreibung}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Abrechenbar</f:facet>
                        #{z.abrechenbar ? 'Ja' : 'Nein'}
                    </h:column>
                </h:dataTable>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/template.xhtml">

    <ui:define name="title">Projekte - SAP Consulting App</ui:define>
    <ui:define name="heading">Projektverwaltung</ui:define>

    <ui:define name="content">
        <!-- Formular: Projekt anlegen / bearbeiten -->
        <div class="section">
            <h2>#{empty projektController.ausgewaehltesProjekt.id ? 'Neues Projekt anlegen' : 'Projekt bearbeiten'}</h2>
            <h:form id="projektForm">
                <div class="form-group">
                    <h:outputLabel for="bezeichnung" value="Bezeichnung:" />
                    <h:inputText id="bezeichnung" value="#{projektController.ausgewaehltesProjekt.bezeichnung}"
                                 required="true" requiredMessage="Bezeichnung ist erforderlich" />
                </div>
                <div class="form-group">
                    <h:outputLabel for="beschreibung" value="Beschreibung:" />
                    <h:inputTextarea id="beschreibung" value="#{projektController.ausgewaehltesProjekt.beschreibung}"
                                     rows="3" />
                </div>
                <div class="form-group">
                    <h:outputLabel for="kunde" value="Kunde:" />
                    <h:selectOneMenu id="kunde" value="#{projektController.ausgewaehltesProjekt.kunde}"
                                     converter="kundeConverter" required="true"
                                     requiredMessage="Kunde muss ausgewaehlt werden">
                        <f:selectItem itemLabel="-- Kunde waehlen --" itemValue="" noSelectionOption="true" />
                        <f:selectItems value="#{projektController.alleKunden}" var="k"
                                       itemLabel="#{k.firmenname}" itemValue="#{k}" />
                    </h:selectOneMenu>
                </div>
                <div class="form-group">
                    <h:outputLabel for="sapModul" value="SAP-Modul:" />
                    <h:selectOneMenu id="sapModul" value="#{projektController.ausgewaehltesProjekt.sapModul}"
                                     required="true" requiredMessage="SAP-Modul muss ausgewaehlt werden">
                        <f:selectItem itemLabel="-- Modul waehlen --" itemValue="" noSelectionOption="true" />
                        <f:selectItems value="#{projektController.sapModule}" var="m"
                                       itemLabel="#{m.bezeichnung}" itemValue="#{m}" />
                    </h:selectOneMenu>
                </div>
                <div class="form-group">
                    <h:outputLabel for="startDatum" value="Startdatum:" />
                    <h:inputText id="startDatum" value="#{projektController.ausgewaehltesProjekt.startDatum}">
                        <f:convertDateTime pattern="dd.MM.yyyy" />
                    </h:inputText>
                </div>
                <div class="form-group">
                    <h:outputLabel for="endDatum" value="Enddatum:" />
                    <h:inputText id="endDatum" value="#{projektController.ausgewaehltesProjekt.endDatum}">
                        <f:convertDateTime pattern="dd.MM.yyyy" />
                    </h:inputText>
                </div>
                <div class="form-group">
                    <h:outputLabel for="budgetStunden" value="Budget (Stunden):" />
                    <h:inputText id="budgetStunden" value="#{projektController.ausgewaehltesProjekt.budgetStunden}" />
                </div>
                <div class="form-group">
                    <h:outputLabel for="budgetEuro" value="Budget (Euro):" />
                    <h:inputText id="budgetEuro" value="#{projektController.ausgewaehltesProjekt.budgetEuro}" />
                </div>
                <h:commandButton value="Speichern" action="#{projektController.speichern}"
                                 styleClass="btn btn-primary" />
                <h:commandButton value="Abbrechen" action="#{projektController.neuesProjekt}"
                                 styleClass="btn" immediate="true" />
            </h:form>
        </div>

        <!-- Tabelle: Alle Projekte -->
        <div class="section">
            <h2>Projektliste</h2>
            <h:form id="projektListe">
                <h:dataTable value="#{projektController.projekte}" var="p"
                             styleClass="" headerClass="" rowClasses="">
                    <h:column>
                        <f:facet name="header">Bezeichnung</f:facet>
                        #{p.bezeichnung}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Kunde</f:facet>
                        #{p.kunde.firmenname}
                    </h:column>
                    <h:column>
                        <f:facet name="header">SAP-Modul</f:facet>
                        #{p.sapModul}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Status</f:facet>
                        #{p.status}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Zeitraum</f:facet>
                        <h:outputText value="#{p.startDatum}">
                            <f:convertDateTime pattern="dd.MM.yyyy" />
                        </h:outputText>
                        -
                        <h:outputText value="#{p.endDatum}">
                            <f:convertDateTime pattern="dd.MM.yyyy" />
                        </h:outputText>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Aktionen</f:facet>
                        <h:commandButton value="Bearbeiten" action="#{projektController.bearbeiten(p)}"
                                         styleClass="btn btn-primary" />
                        <h:link value="Detail" outcome="/projekt-detail.xhtml" styleClass="btn btn-success">
                            <f:param name="id" value="#{p.id}" />
                        </h:link>
                        <h:commandButton value="Loeschen" action="#{projektController.loeschen(p.id)}"
                                         styleClass="btn btn-danger"
                                         onclick="return confirm('Wirklich loeschen?');" />
                    </h:column>
                </h:dataTable>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title><ui:insert name="title">SAP Consulting App</ui:insert></title>
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
    <!-- Navigation -->
    <div class="navbar">
        <h:link value="SAP Consulting" outcome="/index.xhtml" styleClass="brand" />
        <h:link value="Dashboard" outcome="/index.xhtml" />
        <h:link value="Kunden" outcome="/kunden.xhtml" />
        <h:link value="Projekte" outcome="/projekte.xhtml" />
        <h:link value="Berater" outcome="/berater.xhtml" />
        <h:link value="Zeitbuchung" outcome="/zeitbuchung.xhtml" />
    </div>

    <!-- Inhalt -->
    <div class="container">
        <h1><ui:insert name="heading">SAP Consulting App</ui:insert></h1>

        <!-- Globale Nachrichten -->
        <h:messages id="globalMessages" globalOnly="true"
                    infoClass="messages info"
                    errorClass="messages error"
                    warnClass="messages warn" />

        <ui:insert name="content">
            <!-- Seiteninhalt wird hier eingefuegt -->
        </ui:insert>
    </div>
</h:body>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
	<title>
		<ui:insert name="title">SAP Consulting App</ui:insert>
	</title>
	<h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
	<!-- Navigation -->
	<div class="navbar">
		<a href="#{request.contextPath}/dashboard" class="brand">SAP Consulting</a>
		<a href="#{request.contextPath}/dashboard">Dashboard</a>
		<a href="#{request.contextPath}/kunden">Kunden</a>
		<a href="#{request.contextPath}/projekte">Projekte</a>
		<a href="#{request.contextPath}/berater">Berater</a>
		<a href="#{request.contextPath}/zeitbuchung">Zeitbuchung</a>
	</div>

	<!-- Inhalt -->
	<div class="container">
		<h1>
			<ui:insert name="heading">SAP Consulting App</ui:insert>
		</h1>

		<!-- Flash-Nachrichten vom Servlet (CDI FlashMessage Bean) -->
		<h:panelGroup rendered="#{flashMessage.vorhanden}">
			<div class="messages #{flashMessage.typ}">#{flashMessage.nachricht}</div>
		</h:panelGroup>

		<ui:insert name="content">
			<!-- Seiteninhalt wird hier eingefuegt -->
		</ui:insert>
	</div>
</h:body>

</html>
